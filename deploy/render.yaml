services:
  - type: web
    name: contentforge-api
    runtime: python
    plan: free
    buildCommand: pip install -r deploy/requirements-api.txt
    startCommand: gunicorn deploy.wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # set manually in Render dashboard
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: PYTHONPATH
        value: /opt/render/project/src/src
