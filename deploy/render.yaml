services:
  - type: web
    name: contentforge-api
    runtime: python
    plan: free
    buildCommand: pip install -r deploy/requirements-api.txt
    startCommand: gunicorn deploy.wsgi:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # set manually in Render dashboard
      - key: RAPIDAPI_PROXY_SECRET
        sync: false   # set manually after listing on RapidAPI (Provider → My APIs → backend secret)
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: PYTHONPATH
        value: /opt/render/project/src   # repo root — makes `scripts` and `src` importable
